<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#g)"/>
  <!-- Ascending staircase steps — Klangtreppe -->
  <g fill="#f0a500" opacity="0.35">
    <rect x="3"  y="24" width="6" height="5" rx="0.5"/>
    <rect x="9"  y="20" width="6" height="9" rx="0.5"/>
    <rect x="15" y="16" width="6" height="13" rx="0.5"/>
    <rect x="21" y="12" width="6" height="17" rx="0.5"/>
  </g>
  <!-- Bright top surfaces of steps -->
  <g fill="#f0a500">
    <rect x="3"  y="24" width="6" height="2" rx="0.5"/>
    <rect x="9"  y="20" width="6" height="2" rx="0.5"/>
    <rect x="15" y="16" width="6" height="2" rx="0.5"/>
    <rect x="21" y="12" width="6" height="2" rx="0.5"/>
  </g>
  <!-- Sound wave arcs ascending with the stairs -->
  <g fill="none" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
    <path d="M8 22 Q10 20, 12 22"/>
    <path d="M14 18 Q16 15.5, 18 18"/>
    <path d="M20 14 Q22 11, 24 14"/>
  </g>
  <!-- Top glow dot -->
  <circle cx="27" cy="8" r="2" fill="#f0a500" opacity="0.5"/>
  <circle cx="27" cy="8" r="1" fill="#f0a500" opacity="0.9"/>
</svg>
